- hosts: localhost
  tasks:

    - name: Pull latest calculator image
      command: docker pull vamsi124/scientific-calculator:latest

    - name: Stop existing container
      command: docker stop calculator-container
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm calculator-container
      ignore_errors: yes

    - name: Run new container
      command: docker run -dit --name calculator-container vamsi124/scientific-calculator:latest
